name: Deploy to Production

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Test Backend
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      - run: npm ci
      - run: npm run lint 2>/dev/null || true
      - run: npm run build 2>/dev/null || npx tsc --noEmit

  # Test Frontend Client
  test-frontend-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend-client/package-lock.json
      - run: npm ci
      - run: npm run build

  # Test Frontend Admin
  test-frontend-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend-admin/package-lock.json
      - run: npm ci
      - run: npm run build

  # Deploy Frontend Client to Vercel (production)
  deploy-client:
    needs: [test-backend, test-frontend-client]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_CLIENT_PROJECT_ID }}
          working-directory: ./frontend-client
          vercel-args: '--prod'

  # Deploy Frontend Admin to Vercel (production)
  deploy-admin:
    needs: [test-backend, test-frontend-admin]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: ./frontend-admin
          vercel-args: '--prod'
